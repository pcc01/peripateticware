;; PgBouncer configuration
;; This is the configuration for PgBouncer connection pool
;; Place this file at /etc/pgbouncer/pgbouncer.ini (Linux)
;; or in your Docker container at /etc/pgbouncer/pgbouncer.ini

;;;
;;; DATABASE
;;;

[databases]
; Format: db = host=localhost port=5432 dbname=mydb user=myuser password=mypass
; The database name here (peripateticware) is what clients connect to
peripateticware = host=postgres port=5432 dbname=peripateticware user=postgres password=postgres

;;;
;;; PGBOUNCER SETTINGS
;;;

[pgbouncer]
; Host and port for incoming connections
listen_addr = *
listen_port = 6432

; Unix socket location (optional, useful for local connections)
unix_socket_dir = /var/run/pgbouncer

; Logging
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid
log_disconnections = 1
log_connections = 1

; Connection pool management
; pool_mode determines when a connection is returned to pool
pool_mode = transaction
; Other options:
;   session  = one connection per client, reused after logout
;   transaction = connection returned to pool after each transaction (recommended)
;   statement = connection returned to pool after each statement (strict, not recommended)

; Pool size tuning
max_client_conn = 1000          ; Maximum client connections (can support up to 1000 concurrent users)
default_pool_size = 25          ; Typical number of connections per database
min_pool_size = 10              ; Minimum connections to keep open
reserve_pool_size = 5           ; Extra connections to create if pool is exhausted
reserve_pool_timeout = 3        ; Seconds to wait for a connection from reserve pool

; Connection aging and recycling
server_lifetime = 3600          ; Close server connection after this many seconds
server_idle_timeout = 600       ; Close server connection after idle for this many seconds
client_idle_timeout = 600       ; Close client connection after idle for this many seconds

; Health checks
pool_pre_ping = true            ; Test connections before using them (PgBouncer will send SELECT 1)

; Authentication
auth_type = trust              ; Trust local connections (change if needed)
auth_file = /etc/pgbouncer/userlist.txt

; Statistics
stats_period = 60              ; How often to write stats to log
stats_users = postgres         ; Users for stats

; Timeout settings (in seconds)
query_wait_timeout = 120       ; How long client can wait for server connection
query_timeout = 0              ; Disconnect clients that take longer (0 = disabled)
idle_in_transaction_session_timeout = 0

; Advanced options
max_db_connections = 100       ; Max connections per database (leave 0 for unlimited)
max_user_connections = 0       ; Max connections per user (0 = unlimited)
application_name_add_host = 0

; Misc
admin_users = postgres
verbose = 0
