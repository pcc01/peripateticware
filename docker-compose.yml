services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: peripateticware-postgres
    environment:
      POSTGRES_DB: peripateticware
      POSTGRES_USER: peripateticware_user
      POSTGRES_PASSWORD: peripateticware_secure_password_dev
      POSTGRES_INITDB_ARGS: ""
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peripateticware_user -d peripateticware"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - peripateticware-mesh
    restart: unless-stopped

  # FastAPI Backend Controller
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: peripateticware-fastapi
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://peripateticware_user:peripateticware_secure_password_dev@postgres:5432/peripateticware
      REDIS_URL: redis://redis:6379/0
      
      # LLM Provider Configuration
      LLM_PROVIDER: claude
      # Options: "claude" or "ollama"
      
      # Claude Configuration (API-based, cloud)
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-sk-ant-your-api-key-here}
      CLAUDE_MODEL: claude-3-5-sonnet-20241022
      CLAUDE_MAX_TOKENS: 2048
      
      # Ollama Configuration (Host-based, self-hosted)
      # When using Ollama on host: http://host.docker.internal:11434
      # When using Ollama in Docker (if you add it back): http://ollama:11434
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL_TEXT: llama2
      OLLAMA_MODEL_VISION: llava
      OLLAMA_MODEL_AUDIO: whisper
      
      # Security & CORS
      CORS_ORIGINS: '["*"]'
      SECRET_KEY: dev-secret-key-change-in-production
      
      # Application
      LOG_LEVEL: INFO
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
    ports:
      - "8010:8010"
    command: uvicorn main:app --host 0.0.0.0 --port 8010 --reload
    networks:
      - peripateticware-mesh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  # Redis for caching and async tasks
  redis:
    image: redis:7-alpine
    container_name: peripateticware-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - peripateticware-mesh
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # Observability: Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: peripateticware-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - peripateticware-mesh
    restart: unless-stopped

  # Observability: Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: peripateticware-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_INSTALL_PLUGINS: 'grafana-piechart-panel'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana-provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - peripateticware-mesh
    restart: unless-stopped

  # Nginx reverse proxy (simulates Cloudflare Tunnel)
  nginx:
    image: nginx:alpine
    container_name: peripateticware-nginx
    depends_on:
      fastapi:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "443:443"
      - "80:80"
    networks:
      - peripateticware-mesh
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  peripateticware-mesh:
    driver: bridge