version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: peripateticware-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: peripateticware
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-peripateticware}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - peripateticware

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: peripateticware-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - peripateticware

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: peripateticware-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-peripateticware}
      REDIS_URL: redis://redis:6379
      
      # LLM Configuration - Choose your provider
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      
      # Ollama (Local) - runs on host at http://host.docker.internal:11434
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-true}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
      
      # Claude/Anthropic (Cloud)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:- }
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-1}
      
      # OpenAI (Cloud - Optional)
      OPENAI_API_KEY: ${OPENAI_API_KEY:- }
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4-turbo}
      
      # Other config
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - peripateticware

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: peripateticware-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${FRONTEND_API_URL:-http://localhost:8000}
      VITE_ENV: ${ENVIRONMENT:-development}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - peripateticware

  # ============================================================================
  # OPTIONAL: Nginx Reverse Proxy (production only)
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: peripateticware-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - peripateticware
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local

networks:
  peripateticware:
    driver: bridge