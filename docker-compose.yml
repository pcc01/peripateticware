version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: peripateticware-postgres
    environment:
      POSTGRES_DB: peripateticware
      POSTGRES_USER: peripateticware_user
      POSTGRES_PASSWORD: peripateticware_secure_password_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peripateticware_user -d peripateticware"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - peripateticware-mesh
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: peripateticware-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - peripateticware-mesh
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: peripateticware-fastapi
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://peripateticware_user:peripateticware_secure_password_dev@postgres:5432/peripateticware
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: claude
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-sk-ant-your-api-key-here}
      CLAUDE_MODEL: claude-3-5-sonnet-20241022
      CLAUDE_MAX_TOKENS: 2048
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL_TEXT: llama2
      OLLAMA_MODEL_VISION: llava
      OLLAMA_MODEL_AUDIO: whisper
      CORS_ORIGINS: '["http://localhost:5173", "http://localhost:3000", "http://localhost:19000", "http://localhost:19006", "*"]'
      ALLOWED_HOSTS: '["*"]'
      SECRET_KEY: dev-secret-key-change-in-production
      LOG_LEVEL: INFO
      ENVIRONMENT: development
      DEBUG: "True"
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - peripateticware-mesh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: peripateticware-web
    depends_on:
      fastapi:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    networks:
      - peripateticware-mesh
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: peripateticware-nginx
    depends_on:
      fastapi:
        condition: service_healthy
      web:
        condition: service_started
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - peripateticware-mesh
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: peripateticware-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - peripateticware-mesh
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: peripateticware-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - peripateticware-mesh
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  peripateticware-mesh:
    driver: bridge